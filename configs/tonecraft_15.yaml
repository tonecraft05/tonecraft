testname: "ToneCraft"
testId: tonecraft_ab_test
bufferSize: 2048
stopOnErrors: false
showWaveform: false
remoteService: service/write.php

pages:

  - type: generic
    id: welcome
    name: "Welcome to ToneCraft Listening Test"
    content: >
      <p>Thank you for participating in this listening test.</p>

      <p>In each trial, you will hear a <strong>Reference</strong> guitar tone and two
      audio samples, <strong>A</strong> and <strong>B</strong>.</p>

      <p>Your task is simple:</p>
      <ul>
        <li>Listen to the <strong>Reference</strong> first.</li>
        <li>Then listen to <strong>A</strong> and <strong>B</strong>.</li>
        <li>Move the slider for the sample that sounds <strong>closer</strong> to the Reference <strong>higher</strong> (towards 100).</li>
        <li>Move the slider for the sample that sounds <strong>further</strong> from the Reference <strong>lower</strong> (towards 0).</li>
        <li>You may listen to each sample as many times as you like.</li>
      </ul>

      <p><strong>Example:</strong> If A sounds very close to the Reference, move A to 90. If B sounds quite different, move B to 20.</p>

      <p>Please use <strong>headphones</strong> for the best experience.</p>

  - type: mushra
    id: trial_003
    name: "Trial 3"
    content: "Listen to Reference, then move the sliders: higher = closer to Reference."
    showWaveform: false
    showConditionNames: true
    enableLooping: false
    reference: configs/audio/003_ref.wav
    createAnchor35: false
    createAnchor70: false
    stimuli:
      A: configs/audio/003_A.wav
      B: configs/audio/003_B.wav

