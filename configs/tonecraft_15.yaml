testname: "ToneCraft"
testId: tonecraft_ab_test
bufferSize: 2048
stopOnErrors: false
showWaveform: false
remoteService: service/write.php

pages:

  - type: generic
    id: welcome
    name: "Welcome to ToneCraft Listening Test"
    content: >
      <p>We invite you to take part in a 8 minute listening experiment to test the results of our model. ToneCraft is an AI driven simulator for guitar tones, which is able to predict underlying parameter settings across multi-effect guitar chains, directly from an input audio sample.</p>

      <p>In each trial, you will hear a <strong>Reference</strong> guitar tone and an audio sample <strong>A</strong>, reconstructed with settings predicted by our model.</p>

      <p>The task is simple:</p>
      <ul>
        <li>Listen to the <strong>Reference</strong> first. Then listen to sample <strong>A</strong>.</li>
        <li>Move the slider to reflect how close <strong>A</strong> sounds to the Reference. <strong>Example:</strong> A sounds very close → A = 90. A sounds quite different → A = 20.</li>
        <li>You may listen to each sample as many times as you like.</li>
        <li>Data collected will only be used for research purposes.</li>
      </ul>

      <p>Please use <strong>headphones</strong> for the best experience.</p>

      <p>Thank you for your help in advance.</p>

  - type: mushra
    id: trial_003
    name: "Trial 3"
    content: "Listen to Reference, then move the slider: higher = closer to Reference."
    showWaveform: false
    showConditionNames: true
    enableLooping: false
    reference: configs/audio/003_ref.wav
    createAnchor35: false
    createAnchor70: false
    stimuli:
      A: configs/audio/003_A.wav

