  - type: finish
    name: "Thank You"
    content: "Thank you for completing the ToneCraft listening test! Please fill in the details below before submitting."
    showResults: false
    writeResults: true
    questionnaire:
        - type: number
          label: Age
          name: age
          min: 0
          max: 100
          default: 25

        - type: likert
          name: guitar_player
          label: Do you play electric guitar?
          response:
           - value: yes
             label: Yes
           - value: no
             label: No

        - type: likert
          name: guitar_experience
          label: Years of experience with electric guitar?
          response:
           - value: none
             label: No experience
           - value: 1_2
             label: 1-2 years
           - value: 3_5
             label: 3-5 years
           - value: 5_10
             label: 5-10 years
           - value: 10plus
             label: 10+ years

        - type: likert
          name: guitar_listening
          label: How often do you listen to electric guitar music?
          response:
           - value: rarely
             label: Rarely
           - value: sometimes
             label: Sometimes
           - value: often
             label: Often
           - value: daily
             label: Daily
