testname: "ToneCraft"
testId: tonecraft_ab_test
bufferSize: 2048
stopOnErrors: false
showWaveform: false
enableLooping: true
randomize: false
remoteService: service/write.php

pages:

  - type: generic
    id: welcome
    name: "Welcome to ToneCraft Listening Test"
    content: >
      <p>Thank you for participating in this listening test.</p>

      <p>In each trial, you will hear a <strong>Reference</strong> guitar tone followed by two 
      audio samples, <strong>A</strong> and <strong>B</strong>.</p>

      <p>Your task is to evaluate how closely each sample matches the Reference tone 
      by moving the sliders:</p>

      <ul>
        <li>Move the slider <strong>higher</strong> (towards 100) if the sample sounds <strong>close</strong> to the Reference.</li>
        <li>Move the slider <strong>lower</strong> (towards 0) if the sample sounds <strong>different</strong> from the Reference.</li>
      </ul>

      <p><strong>Instructions:</strong></p>
      <ul>
        <li>Listen to the Reference first, then compare A and B.</li>
        <li>You may listen to each sample as many times as you like.</li>
        <li>Rate both A and B before moving to the next trial.</li>
        <li>There are no right or wrong answers - trust your ears.</li>
      </ul>

      <p>Please use headphones for the best experience.</p>

  - type: mushra
    id: trial_001
    name: "Trial 1"
    content: "Rate how closely A and B match the Reference tone."
    showWaveform: false
    showConditionNames: true
    reference: configs/audio/001_ref.wav
    createAnchor35: false
    createAnchor70: false
    stimuli:
      A: configs/audio/001_A.wav
      B: configs/audio/001_B.wav

